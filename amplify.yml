version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - rm -rf node_modules
        - pnpm install
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - /root/.local/share/pnpm/store/**/*
